<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>点击触发接口演示</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 36rem; margin: 2rem auto; padding: 0 1rem; }
    button { padding: 0.5rem 1rem; cursor: pointer; }
    #out { margin-top: 1rem; white-space: pre-wrap; word-break: break-all; }
  </style>
</head>
<body>
  <h1>点击触发接口演示</h1>
  <p>点击下方按钮会通过 <code>fetch</code> 请求同源接口 <code>/api/ping</code>。可在浏览器开发者工具 Network 或 Playwright Trace 中查看。</p>
  <p>
    <button type="button" id="btn">请求 /api/ping</button>
  </p>
  <div id="out"></div>
  <script>
    const out = document.getElementById("out");
    document.getElementById("btn").addEventListener("click", async () => {
      out.textContent = "请求中…";
      try {
        const r = await fetch("/api/ping", { headers: { Accept: "application/json" } });
        const text = await r.text();
        out.textContent = "HTTP " + r.status + "\n" + text;
      } catch (e) {
        out.textContent = "失败: " + e;
      }
    });
  </script>
</body>
</html>
